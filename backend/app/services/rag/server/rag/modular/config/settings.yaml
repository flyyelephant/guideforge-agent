# Modular RAG MCP Server - Local Runtime Configuration

llm:
  provider: "openai"
  model: "qwen-plus"
  temperature: 0.0
  max_tokens: 4096
  api_key: ""
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""

embedding:
  provider: "openai"
  model: "text-embedding-v4"
  dimensions: 1024
  api_key: ""
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""

vision_llm:
  enabled: false
  provider: "openai"
  model: "qwen-vl-plus"
  max_image_size: 2048
  api_key: ""
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""

vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

rerank:
  enabled: false
  provider: "none"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 8
  chunk_refiner:
    use_llm: false
  metadata_enricher:
    use_llm: false
